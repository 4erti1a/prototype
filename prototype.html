<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Инициатива · Прототип</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
/* ─── inter, lowercase, -4% letter-spacing everywhere ─── */

:root {
  /* surface — light */
  --bg:            #f3f5f8;
  --bg-2:          #e9edf3;
  --surface:       #ffffff;
  --surface-2:     #f5f7fb;
  --surface-3:     #eef1f6;
  --border:        #dde3ec;
  --border-strong: #c5cdd9;
  --divider:       #ebeef4;

  /* text */
  --text-1: #0c1626;
  --text-2: #4b5667;
  --text-3: #8a94a3;
  --text-4: #b3bbc7;

  /* primary */
  --primary:       #0a59d6;
  --primary-hover: #084bb8;
  --primary-press: #073e98;
  --primary-soft:  #e6edfb;
  --primary-soft-2:#cfdcf6;
  --primary-ink:   #0a2b66;

  /* status — semi-transparent fills per brand guide */
  --st-pend-bg:     rgba(234, 179,   8, 0.15);
  --st-pend-fg:     #ca8a04;
  --st-pend-br:     rgba(234, 179,   8, 0.30);

  --st-accept-bg:   rgba( 34, 197,  94, 0.12);
  --st-accept-fg:   #16a34a;
  --st-accept-br:   rgba( 34, 197,  94, 0.25);

  --st-work-bg:     rgba( 10,  89, 214, 0.10);
  --st-work-fg:     #0a59d6;
  --st-work-br:     rgba( 10,  89, 214, 0.25);

  --st-deny-bg:     rgba(239,  68,  68, 0.12);
  --st-deny-fg:     #dc2626;
  --st-deny-br:     rgba(239,  68,  68, 0.25);

  /* radii — strict */
  --r-6:  6px;
  --r-8:  8px;
  --r-12: 12px;
  --r-16: 16px;

  --ring: 0 0 0 3px rgba(10, 89, 214, 0.18);
  /* compat aliases */
  --status-pend:        #ca8a04;
  --status-accept:      #16a34a;
  --status-work:        #0a59d6;
  --status-deny:        #dc2626;
  --status-accept-soft: rgba(34, 197, 94, 0.12);
  --r-md: 12px;
}

*, *::before, *::after {
  box-sizing: border-box;
  letter-spacing: -0.04em;
  text-transform: none;
}
html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text-1);
  font-family: 'Lato', system-ui, -apple-system, sans-serif;
  font-weight: 400;
  text-transform: lowercase;
  -webkit-font-smoothing: antialiased;
  font-size: 16px;
  line-height: 1.5;
}
button, input, select, textarea {
  font: inherit;
  letter-spacing: -0.04em;
  text-transform: lowercase;
  color: inherit;
}

/* type scale: 12 / 14 / 16 / 20 / 24 */
.text-xs   { font-size: 12px; line-height: 1.4; }
.text-sm   { font-size: 14px; line-height: 1.4; }
.text-base { font-size: 16px; line-height: 1.5; }
.text-lg   { font-size: 20px; line-height: 1.3; }
.text-xl   { font-size: 24px; line-height: 1.2; }

/* ─── stage / multi-phone canvas ─── */
.stage {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 260px 1fr;
}

.stage-rail {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 20px 16px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}

.stage-rail .brand {
  font-weight: 700;
  font-size: 20px;
  margin-bottom: 4px;
}
.stage-rail .brand b { color: var(--primary); font-weight: 700; }
.stage-rail .brand-sub {
  font-size: 12px;
  color: var(--text-3);
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 24px;
}

.rail-group { margin-bottom: 16px; }
.rail-group .head {
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-3);
  margin-bottom: 8px;
  padding: 0 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.rail-group .pri {
  font-size: 12px;
  background: var(--text-3);
  color: var(--surface);
  padding: 1px 6px;
  border-radius: var(--r-6);
  font-weight: 700;
}
.rail-group.p0 .pri { background: var(--st-deny-fg); }
.rail-group.p1 .pri { background: var(--primary); }
.rail-group.p2 .pri { background: var(--st-accept-fg); }

.rail-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 12px;
  border-radius: var(--r-8);
  cursor: pointer;
  font-size: 14px;
  color: var(--text-2);
  border: 1px solid transparent;
  user-select: none;
}
.rail-item:hover { background: var(--surface-2); color: var(--text-1); }
.rail-item.active {
  background: var(--primary-soft);
  color: var(--primary);
  font-weight: 700;
  border-color: var(--primary-soft-2);
}
.rail-item .ix {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-4);
  width: 18px;
}
.rail-item.active .ix { color: var(--primary); }

/* main */
.stage-main {
  padding: 32px 32px 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
}

.stage-header {
  width: 100%;
  max-width: 980px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.stage-header .title {
  font-size: 24px;
  font-weight: 700;
  line-height: 1.2;
}
.stage-header .url {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-3);
  background: var(--surface);
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: var(--r-6);
  margin-top: 8px;
  display: inline-block;
}
.stage-header .note {
  max-width: 460px;
  font-size: 14px;
  color: var(--text-2);
  text-align: right;
  line-height: 1.4;
}

/* ─── phone frame ─── */
.phone-wrap {
  display: flex;
  justify-content: center;
  gap: 28px;
  flex-wrap: wrap;
  padding-top: 8px;
}
.phone {
  width: 390px;
  height: 844px;
  background: #1a1f29;
  border-radius: 50px;
  padding: 12px;
  flex-shrink: 0;
  position: relative;
  border: 1px solid #2a2f3a;
}
.phone::after {
  content: '';
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 32px;
  background: #1a1f29;
  border-radius: 0 0 18px 18px;
  z-index: 10;
  pointer-events: none;
}
.phone .screen {
  width: 100%;
  height: 100%;
  background: var(--bg);
  border-radius: 38px;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
}

/* status bar */
.statusbar {
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 28px 0;
  font-size: 14px;
  font-weight: 700;
  color: var(--text-1);
  flex-shrink: 0;
  text-transform: none;
  font-feature-settings: 'tnum';
}
.statusbar .right {
  display: flex; align-items: center; gap: 4px;
}

/* app body */
.app-body {
  flex: 1;
  min-height: 0;          /* critical: lets flex child shrink so bnav stays pinned */
  overflow-y: auto;
  overscroll-behavior: contain;
  display: flex;
  flex-direction: column;
  position: relative;
}
.app-body::-webkit-scrollbar { width: 0; }

/* iOS Safari fix: 100vh includes browser chrome, dvh tracks actual visible area */
.app-root {
  height: 100vh;           /* fallback for old browsers */
  height: 100dvh;          /* Safari 15.4+: dynamic viewport, excludes browser chrome */
  overflow: hidden;
}

/* app bar */
.appbar {
  position: sticky;
  top: 0;
  z-index: 5;
  background: var(--bg);
  padding: 12px 16px 12px;
  border-bottom: 1px solid var(--divider);
  display: flex;
  align-items: center;
  gap: 12px;
}
.appbar .back-btn {
  width: 36px; height: 36px;
  display: grid; place-items: center;
  border-radius: var(--r-8);
  border: none;
  background: transparent;
  color: var(--text-1);
  cursor: pointer;
}
.appbar .back-btn:hover { background: var(--surface-2); }
.appbar .title {
  font-size: 16px;
  font-weight: 700;
  flex: 1;
  min-width: 0;
}
.appbar .subtitle { font-size: 12px; color: var(--text-3); }
.appbar .icon-btn {
  width: 36px; height: 36px;
  display: grid; place-items: center;
  border-radius: var(--r-8);
  border: none;
  background: transparent;
  cursor: pointer;
  color: var(--text-1);
  position: relative;
}
.appbar .icon-btn:hover { background: var(--surface-2); }
.appbar .icon-btn .badge {
  position: absolute;
  top: 6px; right: 6px;
  width: 8px; height: 8px;
  background: var(--st-deny-fg);
  border-radius: 50%;
  border: 2px solid var(--bg);
}

.city-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  color: var(--text-2);
  background: transparent;
  border: none;
  padding: 4px 0;
  cursor: pointer;
  font-weight: 400;
}
.city-chip svg { color: var(--primary); }
.city-chip b { color: var(--text-1); font-weight: 700; }

/* padding */
.content      { padding: 14px 16px; }
.content-pad  { padding: 0 16px; }

/* headings */
.h1 { font-size: 24px; font-weight: 700; line-height: 1.2; }
.h2 { font-size: 20px; font-weight: 700; line-height: 1.3; }
.h3 { font-size: 16px; font-weight: 700; line-height: 1.4; }
.lead { font-size: 14px; color: var(--text-2); line-height: 1.4; }
.eyebrow {
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-3);
  font-weight: 400;
}
.muted { color: var(--text-3); }
.dim   { color: var(--text-2); }
.mono  { font-family: 'JetBrains Mono', monospace; }

/* ─── buttons ─── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: 44px;
  padding: 0 20px;
  border-radius: var(--r-8);
  background: var(--primary);
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  border: 1px solid var(--primary);
  cursor: pointer;
  transition: background .15s, transform .08s;
  width: 100%;
  font-family: inherit;
}
.btn:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
.btn:active { background: var(--primary-press); transform: scale(0.97); }
.btn.secondary {
  background: var(--surface);
  color: var(--text-1);
  border-color: var(--border-strong);
}
.btn.secondary:hover { background: var(--surface-2); }
.btn.ghost {
  background: transparent;
  color: var(--primary);
  border-color: transparent;
}
.btn.ghost:hover { background: var(--primary-soft); }
.btn.danger {
  background: var(--st-deny-fg);
  border-color: var(--st-deny-fg);
}
.btn.danger:hover { background: #b91c1c; border-color: #b91c1c; }
.btn.sm  { height: 34px; font-size: 13px; padding: 0 14px; }
.btn.lg  { height: 52px; font-size: 16px; }
.btn.icon { width: 44px; padding: 0; }
.btn:disabled {
  background: var(--surface-3);
  color: var(--text-4);
  cursor: not-allowed;
  border-color: var(--border);
}

/* ─── inputs ─── */
.field { display: flex; flex-direction: column; gap: 6px; }
.field .label {
  font-size: 12px;
  color: var(--text-2);
  font-weight: 700;
}
.field .hint {
  font-size: 12px;
  color: var(--text-3);
  display: flex;
  justify-content: space-between;
}
.field .error { color: var(--st-deny-fg); font-size: 12px; }

.input, .textarea, .select {
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: var(--r-8);
  padding: 12px 14px;
  font-size: 15px;
  color: var(--text-1);
  width: 100%;
  outline: none;
  transition: border .12s, box-shadow .12s;
  font-family: inherit;
  font-weight: 400;
}
.input::placeholder, .textarea::placeholder { color: var(--text-4); }
.input:focus, .textarea:focus, .select:focus {
  border-color: var(--primary);
  box-shadow: var(--ring);
}
.textarea { min-height: 100px; resize: none; line-height: 1.4; }

.input-search { position: relative; }
.input-search .input { padding-left: 44px; }
.input-search .ic {
  position: absolute;
  top: 50%; left: 14px;
  transform: translateY(-50%);
  color: var(--text-3);
  pointer-events: none;
}

/* checkbox */
.check {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text-2);
  line-height: 1.4;
}
.check .box {
  width: 22px;
  height: 22px;
  border: 1px solid var(--border-strong);
  border-radius: var(--r-6);
  background: var(--surface);
  flex-shrink: 0;
  display: grid;
  place-items: center;
  margin-top: 1px;
  color: #fff;
  transition: background .12s, border .12s;
}
.check.on .box { background: var(--primary); border-color: var(--primary); }

/* radio chip group */
.chip-group {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

/* ─── chip (unified, 6px radius — no pill) ─── */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 30px;
  padding: 0 10px;
  border-radius: var(--r-6);
  background: var(--surface);
  border: 1px solid var(--border-strong);
  font-size: 13px;
  font-weight: 400;
  color: var(--text-2);
  cursor: pointer;
  white-space: nowrap;
  transition: background .12s, color .12s, border .12s;
  font-family: inherit;
}
.chip:hover { background: var(--surface-2); color: var(--text-1); }
.chip.active {
  background: var(--text-1);
  border-color: var(--text-1);
  color: var(--surface);
  font-weight: 700;
}
.chip.primary {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
  font-weight: 700;
}
.chip.sm { height: 26px; padding: 0 8px; font-size: 12px; }
.chip .count {
  background: var(--surface-3);
  padding: 1px 6px;
  border-radius: var(--r-6);
  font-size: 12px;
  color: var(--text-3);
  font-weight: 400;
}
.chip.active .count { background: rgba(255,255,255,.16); color: rgba(255,255,255,.9); }
.chip.primary .count { background: rgba(255,255,255,.16); color: rgba(255,255,255,.9); }

/* ─── status badge (per guide: 6px, no dot, single-line, translucent, borderless) ─── */
.status-badge {
  display: inline-flex;
  align-items: center;
  height: 22px;
  padding: 0 10px;
  border-radius: var(--r-6);
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
  border: none;
  background: var(--surface-2);
  color: var(--text-2);
}
.status-badge.pend   { background: rgba(234, 179,   8, 0.15); color: #ca8a04; }
.status-badge.accept { background: rgba( 34, 197,  94, 0.15); color: #16a34a; }
.status-badge.work   { background: rgba( 79, 127, 255, 0.15); color: #4f7fff; }
.status-badge.deny   { background: rgba(239,  68,  68, 0.15); color: #dc2626; }
.status-badge.done   { background: rgba( 34, 197,  94, 0.15); color: #16a34a; }

/* category tag */
.cat-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  height: 22px;
  padding: 0 10px;
  font-size: 12px;
  color: var(--text-2);
  background: var(--surface-3);
  border-radius: var(--r-6);
  font-weight: 400;
  white-space: nowrap;
  border: 1px solid transparent;
}
.cat-tag.outline { background: transparent; border-color: var(--border-strong); }

/* ─── card (unified — 12px radius, 16px padding, borderless) ─── */
.card {
  background: var(--surface);
  border-radius: var(--r-12);
  border: none;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  cursor: pointer;
  transition: background .12s, transform .08s;
}
.card:active { transform: scale(0.97); }
.card:hover  { background: var(--surface-2); }
.card.flat { cursor: default; }
.card.flat:active { transform: none; }
.card-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.card .meta { font-size: 12px; color: var(--text-3); }
.card .title {
  font-size: 16px;
  font-weight: 700;
  line-height: 1.3;
  color: var(--text-1);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card .excerpt {
  font-size: 14px;
  color: var(--text-2);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card .stats {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 12px;
  color: var(--text-2);
  font-weight: 400;
}
.card .stats span { display: inline-flex; align-items: center; gap: 4px; }

/* ─── bottom nav ─── */
.bnav {
  flex-shrink: 0;
  height: 78px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: stretch;
  padding: 0 8px env(safe-area-inset-bottom, 12px);
  gap: 0;
  position: relative;
  z-index: 4;
}
.bnav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  background: transparent;
  border: none;
  color: var(--text-3);
  font-size: 10px;
  font-weight: 400;
  cursor: pointer;
  font-family: inherit;
  padding: 6px 2px;
  border-radius: var(--r-8);
}
.bnav-item svg { width: 20px; height: 20px; }
.bnav-item.active { color: var(--primary); font-weight: 700; }

/* fab inside bnav — circular, 52×52, lifted -6px, svg centred */
.bnav-item.fab {
  position: relative;
  flex: 0 0 64px;
  gap: 0;
}
.bnav-item.fab .fab-bg {
  width: 52px;
  height: 52px;
  flex-shrink: 0;
  border-radius: 50%;
  background: var(--primary);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  transform: translateY(-6px);
  transition: background .12s, transform .08s;
  border: none;
  padding: 0;
}
.bnav-item.fab .fab-bg:hover { background: var(--primary-hover); }
.bnav-item.fab:active .fab-bg { transform: translateY(-6px) scale(0.97); }
.bnav-item.fab .fab-label {
  margin-top: -2px;
  color: var(--primary);
  font-size: 12px;
  font-weight: 700;
}

/* ─── timeline ─── */
/* timeline panel — borderless flat surface */
.timeline {
  background: var(--surface);
  border-radius: var(--r-12);
  padding: 16px;
}
.timeline .head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px;
}
.timeline .head .label { font-size: 14px; font-weight: 700; color: var(--text-1); }

.tl-h {
  display: flex; align-items: flex-start;
  gap: 0;
}
.tl-h .step {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  text-align: center;
}
.tl-h .step .dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--surface-3);
  border: 1px solid var(--border-strong);
  display: grid; place-items: center;
  color: var(--text-3);
  font-size: 12px;
  transition: background .15s;
}
.tl-h .step.done .dot { background: var(--st-accept-fg); border-color: var(--st-accept-fg); color: #fff; }
.tl-h .step.now .dot  { background: var(--primary); border-color: var(--primary); color: #fff; }
.tl-h .step.deny .dot { background: var(--st-deny-fg); border-color: var(--st-deny-fg); color: #fff; }
.tl-h .bar {
  height: 1px;
  background: var(--border-strong);
  flex: 0 0 auto;
  width: 24px;
  margin-top: 14px;
}
.tl-h .bar.done { background: var(--st-accept-fg); }
.tl-h .step .lbl {
  font-size: 12px;
  color: var(--text-2);
  font-weight: 400;
  line-height: 1.2;
  margin-top: 4px;
  max-width: 80px;
}
.tl-h .step.done .lbl, .tl-h .step.now .lbl { color: var(--text-1); font-weight: 700; }
.tl-h .step .date {
  font-size: 12px;
  color: var(--text-3);
  font-family: 'JetBrains Mono', monospace;
}

/* ─── empty state ─── */
.empty {
  text-align: center;
  padding: 56px 24px;
  color: var(--text-2);
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.empty .icn {
  width: 56px; height: 56px;

function AppBar({ title, subtitle, onBack, right, center, sticky = true }) {

    <div className="appbar" style={!sticky ? { position: 'static' } : null}>

}

/* ─── status badge ─── */
function StatusBadge({ status }) {
  const s = MOCK.STATUS[status];
  if (!s) return null;
  return <span className={`status-badge ${s.cls}`}>{s.label}</span>;
}

/* ─── category tag ─── */
function CategoryTag({ id }) {
  const c = MOCK.CATEGORIES.find(c => c.id === id);
  if (!c) return null;
  return <span className="cat-tag">{c.name}</span>;
}

function ChipsRow({ children, padded = true }) {
  return (
    <div className="h-scroll" style={padded ? null : { padding: 0 }}>
      {children}
    </div>
  );
}

/* ─── bottom nav (5 items + fab) ─── */
function BottomNav({ active, onNav }) {
  const items = [

  return (
    <div className="bnav">
      {items.map(it => it.fab ? (
        <button key={it.k} className="bnav-item fab" onClick={() => onNav(it.k)}>
          <span className="fab-bg" aria-label="Подать">

        <button
          key={it.k}
          className={`bnav-item${active === it.k ? ' active' : ''}`}
          onClick={() => onNav(it.k)}

          <Icon name={it.icon} size={20} stroke={2}/>

/* ─── timeline (horizontal) ─── */
function TimelineH({ steps }) {
  const items = steps.flatMap((s, i) => {
    const stepEl = (
      <div key={s.id} className={`step ${s.state}`}>
        <div className="dot">
          {s.state === 'done' && <Icon name="check" size={14} stroke={3}/>}
          {s.state === 'now' && '●'}
          {s.state === 'pending' && '○'}
          {s.state === 'deny' && '×'}
        </div>
        <div className="lbl">{s.label}</div>
        <div className="date">{s.date ? formatShortDate(s.date) : '—'}</div>
      </div>
    );
    if (i === steps.length - 1) return [stepEl];
    const barDone = s.state === 'done';
    return [stepEl, <div key={`bar-${i}`} className={`bar${barDone ? ' done' : ''}`}/>];
  });
  return <div className="tl-h">{items}</div>;
}

function formatShortDate(s) {
  const months = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  const [y,m,d] = s.split('-');
  return `${parseInt(d,10)} ${months[parseInt(m,10)-1]}`;
}

/* ─── progress (form steps) ─── */
function StepProgress({ total, active }) {
  return (
    <div className="progress">
      {Array.from({ length: total }).map((_, i) => (
        <div
          key={i}
          className={`seg ${i < active ? 'done' : i === active ? 'on' : ''}`}
        />
      ))}
    </div>
  );
}

/* ─── segmented control ─── */
function Segmented({ value, onChange, options }) {
  return (
    <div className="segmented">
      {options.map(o => (
        <button
          key={o.value}
          className={value === o.value ? 'active' : ''}
          onClick={() => onChange(o.value)}
        >{o.label}</button>
      ))}
    </div>
  );
}

/* ─── tabbar ─── */
function TabBar({ value, onChange, options }) {
  return (
    <div className="tabbar">
      {options.map(o => (
        <button
          key={o.value}
          className={value === o.value ? 'active' : ''}
          onClick={() => onChange(o.value)}
        >{o.label}</button>
      ))}
    </div>
  );
}

/* ─── checkbox-like control ─── */
function Check({ value, onChange, children }) {
  return (
    <div className={`check${value ? ' on' : ''}`} onClick={() => onChange?.(!value)}>
      <div className="box">{value && <Icon name="check" size={14} stroke={3}/>}</div>
      <div>{children}</div>
    </div>
  );
}

/* ─── small confirm sheet ─── */
function Sheet({ title, onClose, children, big }) {
  return (
    <div className="sheet-backdrop" onClick={onClose}>
      <div className="sheet" onClick={e => e.stopPropagation()} style={big ? { maxHeight: '92%' } : null}>

        {title && (
          <div className="head">
            <div className="ti">{title}</div>
            <button className="back-btn" onClick={onClose}><Icon name="close" size={20}/></button>
          </div>
        )}
        {children}
      </div>
    </div>
  );
}

Object.assign(window, {
  StatusBar, AppBar, StatusBadge, CategoryTag,
  ChipsRow, BottomNav, InitiativeCard,
  MiniMap, TimelineH, StepProgress, Segmented, TabBar, Check, Sheet,
  formatShortDate,
});

function plural(n, forms) {
  const mod10 = n % 10, mod100 = n % 100;
  if (mod10 === 1 && mod100 !== 11) return forms[0];
  if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return forms[1];
  return forms[2];
}

/* global React, Icon, MOCK, AppBar, StatusBadge, CategoryTag, MiniMap, TimelineH, formatShortDate */
const { useState: useStateID } = React;

function SLATimer({ slaStart }) {
  const daysElapsed = Math.floor((Date.now() - new Date(slaStart)) / 86400000);
  const daysLeft = 30 - daysElapsed;
  const pct = Math.min(100, Math.max(0, (daysElapsed / 30) * 100));

  let color, text;
  if (daysLeft <= 0) {
    color = 'var(--st-deny-fg)';
    text = 'Срок истёк';
  } else if (daysLeft <= 7) {
    color = 'var(--st-pend-fg)';
    text = `Осталось ${daysLeft} дн.`;
  } else {
    color = 'var(--st-accept-fg)';
    text = `Осталось ${daysLeft} дн.`;
  }

  return (
    <div style={{ padding: '0 16px 12px' }}>
      <div style={{
        display: 'flex', alignItems: 'center', gap: 8,
        padding: '8px 12px',
        background: 'var(--surface)',
        borderRadius: 'var(--r-8)',
        border: '1px solid var(--border)',
      }}>
        <Icon name="clock" size={14} style={{ color, flexShrink: 0 }}/>
        <span style={{ fontSize: 13, color, fontWeight: 400, whiteSpace: 'nowrap' }}>{text}</span>
        <div style={{ flex: 1, background: 'var(--border)', height: 4, borderRadius: 2, overflow: 'hidden' }}>
          <div style={{ width: `${pct}%`, height: '100%', background: color, borderRadius: 2 }}/>
        </div>
      </div>
    </div>
  );
}

function RatingBlock({ initId }) {
  const [rating, setRating] = useStateID(null);
  const [hover, setHover] = useStateID(null);
  const [submitted, setSubmitted] = useStateID(false);
  const [appeal, setAppeal] = useStateID(false);
  const [appealText, setAppealText] = useStateID('');
  const [appealSent, setAppealSent] = useStateID(false);

  const labels = { 1: 'Очень плохо', 2: 'Плохо', 3: 'Удовлетворительно', 4: 'Хорошо', 5: 'Отлично' };
  const activeRating = hover ?? rating;

  const Stars = ({ size = 24, interactive = false }) => (
    <div style={{ display: 'flex', gap: 4 }}>
      {[1, 2, 3, 4, 5].map(i => (
        <button
          key={i}
          disabled={!interactive}
          onClick={interactive ? () => setRating(i) : undefined}
          onMouseEnter={interactive ? () => setHover(i) : undefined}
          onMouseLeave={interactive ? () => setHover(null) : undefined}
          style={{ background: 'none', border: 'none', padding: 0, cursor: interactive ? 'pointer' : 'default', display: 'flex' }}
        >
          <Icon
            name="star" size={size}
            fill={activeRating >= i ? '#f59e0b' : 'none'}
            stroke={1.5}
            style={{ color: activeRating >= i ? '#f59e0b' : 'var(--border-strong)' }}
          />
        </button>
      ))}
    </div>
  );

  return (
    <div style={{ margin: '12px 16px', padding: '14px', background: 'var(--surface)', borderRadius: 'var(--r-12)', border: '1px solid var(--border)' }}>

          <Icon name="check" size={16} stroke={2.5}/>
          <span>Жалоба принята, рассматривается в течение 10 рабочих дней</span>
        </div>
      ) : appeal ? (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          <div style={{ fontWeight: 700, fontSize: 14 }}>Обжалование решения</div>

      )}

}

function formatLong(s) {
  const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  const [y,m,d] = s.split('-');
  return `${parseInt(d,10)} ${months[parseInt(m,10)-1]} ${y}`;
}

                  return (
                    <path
                      key={s.id}
                      d={`M ${x0} ${y0} A ${R} ${R} 0 ${large} 1 ${x1} ${y1} L ${x1i} ${y1i} A ${r} ${r} 0 ${large} 0 ${x0i} ${y0i} Z`}
                      fill={s.color}
                    />
                  );
                })}
                <text x="50" y="48" textAnchor="middle" fontSize="14" fontWeight="700" fill="var(--text-1)" style={{ letterSpacing: '-0.04em' }}>342</text>
                <text x="50" y="60" textAnchor="middle" fontSize="6" fill="var(--text-3)" style={{ letterSpacing: '-0.04em' }}>Всего</text>
              </svg>
            </div>
            <div className="col gap-2" style={{ marginTop: 8 }}>
              {donutSegs.map(s => (
                <div key={s.id} className="row gap-4 middle" style={{ fontSize: 11 }}>
                  <span style={{ width: 8, height: 8, borderRadius: 2, background: s.color }}/>
                  <span className="grow" style={{ color: 'var(--text-2)' }}>{MOCK.STATUS[s.id].label}</span>
                  <span style={{ fontVariantNumeric: 'tabular-nums', color: 'var(--text-1)', fontWeight: 500 }}>{s.pct}%</span>
                </div>
              ))}
            </div>
          </div>

          {/* Line — динамика */}
          <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 14, padding: 12 }}>
            <div className="h3" style={{ fontSize: 14, marginBottom: 4 }}>Динамика</div>
            <div className="muted" style={{ fontSize: 11, marginBottom: 8 }}>Подачи по месяцам</div>
            <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{ width: '100%', height: 100 }}>
              <defs>
                <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="var(--primary)" stopOpacity="0.3"/>
                  <stop offset="100%" stopColor="var(--primary)" stopOpacity="0"/>
                </linearGradient>
              </defs>
              <path d={area} fill="url(#area)"/>
              <path d={path} stroke="var(--primary)" strokeWidth="2" fill="none" vectorEffect="non-scaling-stroke"/>
              {points.map((p, i) => (
                <circle key={i} cx={p[0]} cy={p[1]} r="1.6" fill="var(--primary)"/>
              ))}
            </svg>
            <div className="row between" style={{ marginTop: 4 }}>
              {d.byMonth.map(m => (
                <span key={m.m} style={{ fontSize: 9, color: 'var(--text-3)', fontFamily: 'JetBrains Mono, monospace' }}>{m.m}</span>
              ))}
            </div>
          </div>
        </div>

        {/* By district */}
        <div style={{
          marginTop: 14, background: 'var(--surface)', border: '1px solid var(--border)',
          borderRadius: 14, padding: 14,
        }}>
          <div className="row between middle" style={{ marginBottom: 12 }}>
            <div className="h3">По районам</div>
            <span className="muted" style={{ fontSize: 11 }}>Топ-6</span>
          </div>
          <div className="col gap-6">
            {d.byDistrict.map((r, i) => (
              <div key={r.name} className="col gap-2">
                <div className="row between middle">
                  <span style={{ fontSize: 13, fontWeight: 500 }}>{r.name}</span>
                  <span style={{ fontSize: 12, color: 'var(--text-3)', fontVariantNumeric: 'tabular-nums' }}>
                    <b style={{ color: 'var(--text-1)' }}>{r.n}</b> · {r.pct}%
                  </span>
                </div>
                <div style={{ height: 6, background: 'var(--surface-2)', borderRadius: 3, overflow: 'hidden' }}>
                  <div style={{
                    width: `${r.pct * 3.5}%`, height: '100%',
                    background: 'var(--primary)',
                    borderRadius: 3,
                  }}/>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Top by votes */}
        <div style={{
          marginTop: 14, background: 'var(--surface)', border: '1px solid var(--border)',
          borderRadius: 14, padding: 14,
        }}>
          <div className="row between middle" style={{ marginBottom: 12 }}>
            <div className="h3">Топ по голосам</div>
            <button style={{ background: 'none', border: 'none', color: 'var(--primary)', fontSize: 14, fontWeight: 500, cursor: 'pointer' }}>Смотреть все</button>
          </div>
          <div className="col">
            {topByVotes.map((init, i) => (
              <div
                key={init.id}
                onClick={() => onOpenInitiative?.(init.id)}
                style={{
                  display: 'flex', gap: 10, alignItems: 'center', cursor: 'pointer',
                  padding: '10px 0',
                  borderTop: i === 0 ? 'none' : '1px solid var(--divider)',
                }}
              >
                <span style={{
                  width: 26, height: 26, borderRadius: 6,
                  background: i < 3 ? 'var(--primary)' : 'var(--surface-2)',
                  color: i < 3 ? '#fff' : 'var(--text-2)',
                  display: 'grid', placeItems: 'center',
                  fontSize: 12, fontWeight: 500, flexShrink: 0,
                }}>{i + 1}</span>
                <div className="grow" style={{ minWidth: 0 }}>
                  <div style={{ fontSize: 13, fontWeight: 500, lineHeight: 1.3, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{init.title}</div>
                  <div style={{ fontSize: 10, color: 'var(--text-3)' }}>{init.district}</div>
                </div>
                <div style={{ fontSize: 14, fontWeight: 500, fontVariantNumeric: 'tabular-nums', color: 'var(--primary)' }}>{init.votes}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Footer note */}
        <div style={{ marginTop: 16, padding: 12, background: 'var(--surface-2)', borderRadius: 10, fontSize: 11, color: 'var(--text-2)', lineHeight: 1.4, display: 'flex', gap: 8 }}>
          <Icon name="info" size={14} style={{ flexShrink: 0, color: 'var(--primary)' }}/>
          <span>Данные обновляются ежедневно. Источник: муниципальная база инициатив. <a style={{ color: 'var(--primary)' }}>Скачать CSV</a></span>
        </div>
      </div>
    </div>
  );
}

window.ScreenDashboard = ScreenDashboard;

  </script>

  <script type="text/babel">
/* global React, ReactDOM, Icon, MOCK,
   StatusBar, BottomNav,
   ScreenOnboard, ScreenFeed, ScreenInitiative, ScreenSubmit,
   ScreenMap, ScreenModerator, ScreenProfile, ScreenDashboard */
const { useState, useEffect } = React;

/* ─── responsive breakpoint hook ─── */
function useWindowWidth() {
  const [w, setW] = React.useState(window.innerWidth);
  React.useEffect(() => {
    const h = () => setW(window.innerWidth);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  return w;
}

/* ─── desktop sidebar ─── */
function DesktopSidebar({ active, onNav, city, onChangeCity }) {
  const navItems = [
    { k: 'feed',     l: 'Лента',    icon: 'list'     },
    { k: 'map',      l: 'Карта',    icon: 'map'       },
    { k: 'submit',   l: 'Подать',   icon: 'plus'      },
    { k: 'bookmark', l: 'Избранное', icon: 'bookmark' },
    { k: 'profile',  l: 'Профиль',  icon: 'user'      },
  ];
  return (
    <aside className="desktop-sidebar">
      <div className="ds-brand">
        <div className="ds-logo">иници<span>ати</span>ва</div>
        <div className="ds-sub">Прототип v0.1</div>
      </div>
      <nav className="ds-nav">
        {navItems.map(item => (
          <button
            key={item.k}
            className={`ds-nav-item${active === item.k ? ' active' : ''}`}
            onClick={() => onNav(item.k)}
          >
            <Icon name={item.icon} size={20}/>
            <span>{item.l}</span>
          </button>
        ))}
        <div className="ds-nav-divider"/>
        <button
          className="ds-nav-item"
          onClick={() => onNav('dashboard')}
          style={active === 'dashboard' ? { background: 'var(--primary-soft)', color: 'var(--primary)', fontWeight: 700 } : null}
        >
          <Icon name="chart" size={20}/>
          <span>Аналитика</span>
        </button>
        <button
          className="ds-nav-item"
          onClick={() => onNav('moderator')}
          style={active === 'moderator' ? { background: 'var(--primary-soft)', color: 'var(--primary)', fontWeight: 700 } : null}
        >
          <Icon name="moderator" size={20}/>
          <span>Модератор</span>
        </button>
      </nav>
      {city && (
        <button
          onClick={onChangeCity}
          style={{
            marginTop: 'auto', display: 'flex', alignItems: 'center', gap: 8,
            padding: '10px 12px', borderRadius: 'var(--r-8)',
            background: 'var(--surface-2)', border: 'none',
            color: 'var(--text-2)', fontSize: 13, cursor: 'pointer',
            fontFamily: 'inherit', letterSpacing: '-0.04em', textTransform: 'lowercase',
            width: '100%', textAlign: 'left',
          }}
        >
          <Icon name="pin" size={16} style={{ color: 'var(--primary)', flexShrink: 0 }}/>
          <span style={{ flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{city}</span>
          <Icon name="chevronD" size={14}/>
        </button>
      )}
    </aside>
  );
}

const ROUTES = [
  { key: 'onboard',    bottom: null    },
  { key: 'feed',       bottom: 'feed'  },
  { key: 'initiative', bottom: 'feed'  },
  { key: 'submit',     bottom: 'submit'},
  { key: 'map',        bottom: 'map'   },
  { key: 'moderator',  bottom: null    },
  { key: 'profile',    bottom: 'profile'},
  { key: 'dashboard',  bottom: null    },
];

function App() {
  const [city, setCity] = useState(() => localStorage.getItem('init.city') || '');
  const [route, setRoute] = useState(() => localStorage.getItem('init.city') ? 'feed' : 'onboard');
  const [initId, setInitId] = useState('init-001');
  const [changeCityMode, setChangeCityMode] = useState(false);
  const w = useWindowWidth();
  const isDesktop = w >= 1280;
  const isTablet  = w >= 768;

  useEffect(() => {
    if (city) localStorage.setItem('init.city', city);
  }, [city]);

  useEffect(() => {
    const hash = `#${route}${route === 'initiative' ? `/${initId}` : ''}`;
    if (window.location.hash !== hash) window.history.replaceState(null, '', hash);
  }, [route, initId]);

  useEffect(() => {
    const h = window.location.hash.replace('#', '');
    if (!h) return;
    const [r, id] = h.split('/');
    if (ROUTES.find(x => x.key === r)) setRoute(r);
    if (id) setInitId(id);
  }, []);

  const goto = (key, opts = {}) => {
    if (key === 'initiative' && opts.id) setInitId(opts.id);
    setRoute(key);
    requestAnimationFrame(() => {
      document.querySelectorAll('.app-body, .desktop-main').forEach(el => el.scrollTo({ top: 0 }));
    });
  };

  const handleNav = (k) => {
    if (k === 'feed')      goto('feed');
    else if (k === 'map')  goto('map');
    else if (k === 'submit')    goto('submit');
    else if (k === 'profile')   goto('profile');
    else if (k === 'dashboard') goto('dashboard');
    else if (k === 'moderator') goto('moderator');
  };

  const handlePickCity = (c) => {
    if (c === null) { setChangeCityMode(false); return; }
    setCity(c);
    setChangeCityMode(false);
    goto('feed');
  };

  const activeBottom = ROUTES.find(r => r.key === route)?.bottom;
  const showBottomNav = !!activeBottom && !changeCityMode;

  /* ── screen content shared between mobile and desktop ── */
  const screenContent = (
    <>
      {(route === 'onboard' || changeCityMode) && (
        <ScreenOnboard hasCity={changeCityMode} onPick={handlePickCity}/>
      )}
      {route === 'feed' && !changeCityMode && (
        <ScreenFeed
          city={city}
          onOpenInitiative={(id) => goto('initiative', { id })}
          onChangeCity={() => setChangeCityMode(true)}
          onOpenNotifications={() => goto('profile')}
        />
      )}
      {route === 'initiative' && !changeCityMode && (
        <ScreenInitiative
          initId={initId}
          onBack={() => goto('feed')}
          onOpenInitiative={(id) => goto('initiative', { id })}
        />
      )}
      {route === 'submit' && !changeCityMode && (
        <ScreenSubmit
          onBack={() => goto('feed')}
          onOpenFeed={() => goto('feed')}
          onDone={(id) => { setInitId('init-001'); goto('initiative'); }}
        />
      )}
      {route === 'map' && !changeCityMode && (
        <ScreenMap
          city={city}
          onOpenInitiative={(id) => goto('initiative', { id })}
          onChangeCity={() => setChangeCityMode(true)}
        />
      )}
      {route === 'moderator' && !changeCityMode && (
        <ScreenModerator
          onBack={() => goto('profile')}
          onOpenInitiative={(id) => goto('initiative', { id })}
        />
      )}
      {route === 'profile' && !changeCityMode && (
        <ScreenProfile
          city={city}
          onChangeCity={() => setChangeCityMode(true)}
          onOpenInitiative={(id) => goto('initiative', { id })}
          onSwitchRole={(r) => goto(r === 'moderator' ? 'moderator' : 'dashboard')}
        />
      )}
      {route === 'dashboard' && !changeCityMode && (
        <ScreenDashboard
          city={city}
          onBack={() => goto('profile')}
          onOpenInitiative={(id) => goto('initiative', { id })}
        />
      )}
    </>
  );

  /* ── desktop layout ── */
  if (isDesktop) {
    return (
      <div className="desktop-root">
        <DesktopSidebar
          active={changeCityMode ? null : (activeBottom || route)}
          onNav={handleNav}
          city={city}
          onChangeCity={() => setChangeCityMode(true)}
        />
        <main className="desktop-main">
          {screenContent}
        </main>
      </div>
    );
  }

  /* ── mobile / tablet layout ── */
  return (
    <div className="app-root" style={{
      display: 'flex', flexDirection: 'column',
      background: 'var(--bg)', position: 'relative',
      maxWidth: isTablet ? '768px' : '480px',
      margin: '0 auto',
    }}>
      {screenContent}
      {showBottomNav && (
        <BottomNav active={activeBottom} onNav={handleNav}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
